name: Lint
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-go@4f6df76b16cc7c4814a18a6b9ad0eda35c0c7d6f # v6.0.0
        with:
          go-version-file: go.mod
          check-latest: true
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.4.0
          args: --timeout=5m

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
      - uses: actions/setup-go@4f6df76b16cc7c4814a18a6b9ad0eda35c0c7d6f # v6.0.0
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Check formatting
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not gofmt -s formatted:"
            echo "$unformatted"
            exit 1
          fi
